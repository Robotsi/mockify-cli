name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        runtime: [bun, node-18, node-20, node-22]

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        if: matrix.runtime != 'bun'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.runtime == 'node-18' && '18' || matrix.runtime == 'node-20' && '20' || '22' }}

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

      - name: Build package
        run: bun run build

      - name: Verify Node CLI
        if: matrix.runtime != 'bun'
        run: node dist/cli.js --version

      - name: Pack dry-run
        run: npm pack --dry-run
